spring:
  # session配置
  session:
    #session过期时间，默认180秒，这里设置为30天
    timeout: 2592000
    store-type: redis

  profiles:
    active: local

  application:
    name: yu-ai-code-mother-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/yu_ai_code_mother}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
  # redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      password: ${REDIS_PASSWORD:}
      ttl: 3600
server:
  port: 8123
  servlet:
    context-path: /api
    # cookie过期时间，默认180秒，这里设置为30天
    session:
      cookie:
        max-age: 2592000
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.yupi.yuaicodemother.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
# Python AI Agent 服务
python:
  ai:
    base-url: ${PYTHON_AI_BASE_URL:http://localhost:8000}
    internal-token: ${PYTHON_AI_INTERNAL_TOKEN:}
    connect-timeout-ms: ${PYTHON_AI_CONNECT_TIMEOUT_MS:3000}
    response-timeout-seconds: ${PYTHON_AI_RESPONSE_TIMEOUT_SECONDS:1800}
    route-timeout-seconds: ${PYTHON_AI_ROUTE_TIMEOUT_SECONDS:30}
ai:
  codegen:
    max-concurrent-requests: ${AI_CODEGEN_MAX_CONCURRENT_REQUESTS:8}
    permit-lease-minutes: ${AI_CODEGEN_PERMIT_LEASE_MINUTES:30}
idempotency:
  enabled: ${IDEMPOTENCY_ENABLED:true}
  processing-ttl-minutes: ${IDEMPOTENCY_PROCESSING_TTL_MINUTES:10}
  ai-processing-ttl-minutes: ${IDEMPOTENCY_AI_PROCESSING_TTL_MINUTES:30}
  success-ttl-hours: ${IDEMPOTENCY_SUCCESS_TTL_HOURS:24}
  failure-ttl-minutes: ${IDEMPOTENCY_FAILURE_TTL_MINUTES:5}
app:
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
############## Sa-Token 配置 ##############
sa-token:
  token-name: satoken
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: true
  is-read-cookie: true
  is-read-header: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: w3c
otel:
  file_format: '1.0'
  resource:
    attributes:
      - name: service.name
        value: yu-ai-code-mother-backend
  tracer_provider:
    processors:
      - batch:
          exporter:
            otlp_http:
              endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}

