spring:
  # session配置
  session:
    #session过期时间，默认180秒，这里设置为30天
    timeout: 2592000
    store-type: redis

  profiles:
    active: local

  application:
    name: yu-ai-code-mother-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/yu_ai_code_mother}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
  # redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      password: ${REDIS_PASSWORD:}
      ttl: 3600
server:
  port: 8123
  servlet:
    context-path: /api
    # cookie过期时间，默认180秒，这里设置为30天
    session:
      cookie:
        max-age: 2592000
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.yupi.yuaicodemother.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
# Python AI Agent 服务
python:
  ai:
    base-url: ${PYTHON_AI_BASE_URL:http://localhost:8000}
app:
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
############## Sa-Token 配置 ##############
sa-token:
  token-name: satoken
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: true
  is-read-cookie: true
  is-read-header: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

