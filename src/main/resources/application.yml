spring:
  # session配置
  session:
    #session过期时间，默认180秒，这里设置为30天
    timeout: 2592000
    store-type: redis

  profiles:
    active: local

  application:
    name: yu-ai-code-mother-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/yu_ai_code_mother
    username: root
    password: 123456
  # redis
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:
      ttl: 3600
server:
  port: 8123
  servlet:
    context-path: /api
    # cookie过期时间，默认180秒，这里设置为30天
    session:
      cookie:
        max-age: 2592000
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.yupi.yuaicodemother.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
# Python AI Agent 服务
python:
  ai:
    base-url: http://localhost:8000
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

